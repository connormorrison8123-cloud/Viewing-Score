<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astronomy Weather Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: url('images/stars/star_cluster.png') no-repeat center center fixed;
  background-size: cover;
  color:#e0e6ff;
  text-align:center;
  overflow-y: auto;
}

.main {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:auto; /* allow content to show */
  padding-top:100px;
}

#funfact-panel {
  position: absolute;
  top: 120px;
  left: 20px;
  width: 260px;
  font-size: 1.375rem;
  text-align: left;
  line-height: 1.4;
}

#funfact-panel img {
  width: 100%;
  border-radius: 10px;
  margin: 10px 0;
}

.search-container {
  margin-bottom:20px;
  margin-top:10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position: relative;
  z-index: 10;
}

#zip {
  width: 315px;
  max-width: 80vw;
  padding: 10px 12px;
  border-radius: 24px;
  border: none;
  outline: none;
  font-size: 1rem;
}

.suggestions {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  max-width: 315px;
  background: #11182b;
  border-radius: 12px;
  margin-top: 6px;
  text-align: left;
  overflow: hidden;
  z-index: 1000;
}

.suggestion-item {
  padding: 10px 14px;
  cursor: pointer;
}

.suggestion-item:hover {
  background: #1b2542;
}

.content {
  display:flex;
  justify-content:flex-start;
  align-items:flex-start;
  gap:20px;
  width:100%;
  max-width:1500px;
  margin-top: 0px;
  padding-left: 20px;
}

.left {
  width:45%;
  flex-shrink:0;
}
.right {
  flex:1;
  min-width:0;
  margin-top: -40px;
}

.card {
  padding:12px;
  margin:5px 0;
  font-size:1.25rem;
  box-sizing:border-box;
}

#conditions {
  font-size: 0.83rem;
  text-align: left;
}

#forecast-content {
  position: relative;
  width:100%;
  text-align:left;
  margin-top:-80px;
  z-index: 0;
}

/* ADJUST GRAPH HEIGHT HERE */
canvas { width:100%; height:425px; }


.moon-img {
  display:block;
  margin:12px auto;
}

.header {
  position:absolute;
  top:20px;
  left:20px;
  text-align:left;
}

.header h1 {
  margin:0;
  font-size:2rem;
  text-shadow: 
    -1px -1px 0 #000,
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000;
}

.header p {
  margin:0;
  font-size:1.5rem;
  color:#aaa;
}

html { font-size: 22px; }
html, body { height:100%; }

/* HOME FACT CENTERING */
.home-fact {
  max-width: 700px;
  width:100%;
  text-align: center;
  margin-top: -40px;
}

.home-fact img {
  width: 100%;
  max-width: 500px;
  border-radius: 12px;
  margin-top: 10px;
}

#moon-global {
  position: absolute;
  top: 20px;
  right: 20px;
  text-align: right;
}

#moon-global img {
  width: 100px;
}

/* ---- MOBILE RESPONSIVE FIX ---- */
@media (max-width: 768px) {

  body {
    font-size: 16px;
  }

  .main {
    padding-top: 120px;
  }

  .content {
    flex-direction: column;
    align-items: center;
  }

  .left, .right {
    width: 90%;
  }

  #forecast-content {
    position: relative;
    left: 0;
    top: 0;
    width: 90%;
    margin-bottom: 20px;
  }

  #moon-global {
    position: relative;
    top: 0;
    right: 0;
    margin-bottom: 10px;
    text-align: center;
  }

  .header {
    position: relative;
    top: 0;
    left: 0;
    text-align: center;
    margin-bottom: 10px;
  }

  #zip {
    width: 100%;
  }

  .search-container div {
    width: 90%;
  }

  canvas {
    height: 300px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>Sky Viewer Forecast</h1>
  <p>Worldwide</p>
</div>
<div id="moon-global"></div>

<div class="main">
  <div class="search-container">
    <div style="display:flex; gap:10px; align-items:center; position:relative;">
      <input id="zip" placeholder="Search city or ZIP">
<button onclick="(function(){ 
  const first=document.querySelector('.suggestion-item'); 
  if(first){ document.getElementById('zip').value=first.dataset.name; }
  document.getElementById('suggestions').innerHTML='';
  getWeather(); 
})()" style="padding:8px 12px; font-size:0.9rem; border-radius:12px; border:none; cursor:pointer;">Go</button>
      <div id="suggestions" class="suggestions"></div>
    </div>
  </div>

  <div id="forecast-content" class="card"></div>

  <div class="content">
    <div class="left card" id="conditions"></div>
    <div class="right card"><canvas id="chart"></canvas></div>
  </div>

</div>

<script>

// ---- AUTOCOMPLETE ----
const input = document.getElementById('zip');
const suggestionsEl = document.getElementById('suggestions');
let debounceTimer;

input.addEventListener('input', () => {
  const q = input.value.trim();
  clearTimeout(debounceTimer);
  if (!q) { suggestionsEl.innerHTML=''; return; }

  debounceTimer = setTimeout(async () => {
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5`);
    const data = await res.json();
    const results = data.results || [];

    suggestionsEl.innerHTML = results.map(r => {
      const label = `${r.name}${r.admin1 ? ', ' + r.admin1 : ''}, ${r.country}`;
      return `<div class="suggestion-item" data-name="${label}">${label}</div>`;
    }).join('');
  }, 250);
});

suggestionsEl.addEventListener('click', (e) => {
  const item = e.target.closest('.suggestion-item');
  if (!item) return;
  input.value = item.dataset.name;
  suggestionsEl.innerHTML = '';
  getWeather();
});

document.getElementById('zip').addEventListener('keypress', e=>{
  if(e.key==='Enter'){
    const first = document.querySelector('.suggestion-item');
    if(first){
      input.value = first.dataset.name;
    }
    suggestionsEl.innerHTML = '';
    getWeather();
  }
});

// ---- VIEWING SCORE FORECAST HELPERS ----
function windDir(deg){
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg/45)%8];
}

function scoreColor(s){
  if (s < 70) return '#e89a9a';
  if (s < 80) return '#e8d88a';
  if (s < 90) return '#b7e4c7';
  return '#2d6a4f';
}

function telescopeScore(d, light){
  let baseScore = (
    (1 - (d.cloudcover||0)/100)*0.3 +
    (1 - (d.humidity||0)/100)*0.15 +
    (1 - (d.precipprob||0)/100)*0.1 +
    (1 - (d.windspeed||0)/25)*0.15 +
    ((d.visibility||0)/15)*0.15 +
    (2*Math.abs((d.moonphase||0)-0.5))*0.1 +
    (1-light)*0.05
  ) * 100;

  // --- NEW: sunlight penalty ---
  if (d.datetime && d.sunrise && d.sunset) {
    const [hour] = d.datetime.split(':').map(Number);

    const [sunriseHour] = d.sunrise.split(':').map(Number);
    const [sunsetHour] = d.sunset.split(':').map(Number);

    // If during daytime, heavily penalize viewing score
    if (hour >= sunriseHour && hour <= sunsetHour) {
      const midday = (sunriseHour + sunsetHour) / 2;

      // stronger penalty near midday
      const distanceFromMidday = Math.abs(hour - midday);
      const maxDistance = (sunsetHour - sunriseHour) / 2;

      const sunFactor = distanceFromMidday / maxDistance; // 0 at noon, 1 near sunrise/sunset

      baseScore *= (0.1 + 0.9 * sunFactor); // near zero at noon, partial near edges
    }
  }

  return baseScore;
}

function estimateLightPollution(address){
  const a = address.toLowerCase();
  if(a.includes('new york') || a.includes('los angeles') || a.includes('chicago') || a.includes('london') || a.includes('tokyo')) return 0.8;
  if(a.includes('phoenix') || a.includes('dallas') || a.includes('miami')) return 0.6;
  return 0.3;
}

function buildNightHours(hours, sunsetStr, sunriseNextStr){
  const today = new Date();
  const [sh, sm] = sunsetStr.split(':').map(Number);
  const [rh, rm] = sunriseNextStr.split(':').map(Number);
  const sunset = new Date(today.getFullYear(), today.getMonth(), today.getDate(), sh, sm);
  const sunriseNext = new Date(today.getFullYear(), today.getMonth(), today.getDate()+1, rh, rm);

  return hours.map(h=>{
    const [hh, mm] = h.datetime.split(':').map(Number);
    let d = new Date(today.getFullYear(), today.getMonth(), today.getDate(), hh, mm);
    if(hh < 12) d = new Date(today.getFullYear(), today.getMonth(), today.getDate()+1, hh, mm);
    return {...h, date:d};
  }).filter(h => h.date >= sunset && h.date <= sunriseNext);
}

let chart;

async function getWeather(){
  // Removed showSection('forecast');
  // Removed document.body.classList.add('searched');
  document.body.classList.remove('lock-scroll');

  const zip = document.getElementById('zip').value;
  if(!zip) return;

  const res = await fetch(`https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${zip}?unitGroup=us&key=ZSMBVQBG98BSW845P5KQ9VVDE&contentType=json&include=hours`);
  const json = await res.json();

  const d = json.days[0];
  const dNext = json.days[1] || d;

  const light = estimateLightPollution(json.resolvedAddress);
  const score = telescopeScore(d, light);

  // moon image helper
  function getMoonImage(p){
    if (p < 0.0625 || p >= 0.9375) return "images/moon/moon_new.png";
    if (p < 0.1875) return "images/moon/moon_waxing_crescent.png";
    if (p < 0.3125) return "images/moon/moon_first_quarter.png";
    if (p < 0.4375) return "images/moon/moon_waxing_gibbous.png";
    if (p < 0.5625) return "images/moon/moon_full.png";
    if (p < 0.6875) return "images/moon/moon_waning_gibbous.png";
    if (p < 0.8125) return "images/moon/moon_last_quarter.png";
    return "images/moon/moon_waning_crescent.png";
  }

  function moonPhaseName(p){
    if (p < 0.0625 || p >= 0.9375) return "New Moon";
    if (p < 0.1875) return "Waxing Crescent";
    if (p < 0.3125) return "First Quarter";
    if (p < 0.4375) return "Waxing Gibbous";
    if (p < 0.5625) return "Full Moon";
    if (p < 0.6875) return "Waning Gibbous";
    if (p < 0.8125) return "Last Quarter";
    return "Waning Crescent";
  }

  const night = buildNightHours(d.hours, d.sunset, dNext.sunrise);

  document.getElementById('conditions').innerHTML = `
    <div style="text-align:left;">
      <h2>${json.resolvedAddress}</h2>
      <h3>Viewing Score: ${score.toFixed(1)}%</h3>
      <h3>Current Temp: ${json.currentConditions?.temp || d.temp}°F</h3>
    </div>

    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; text-align:left; margin-top:10px;">
      <div><b>Conditions:</b><br>${d.conditions}</div>
      <div><b>Temp Range:</b><br>${d.tempmin}–${d.tempmax}°F</div>
      <div><b>Humidity:</b><br>${d.humidity}%</div>

      <div><b>Dew Point:</b><br>${d.dew}°F</div>
      <div><b>Wind:</b><br>${d.windspeed} mph ${windDir(d.winddir)}</div>
      <div><b>Visibility:</b><br>${d.visibility} miles</div>

      <div><b>Sunset:</b><br>${d.sunset}</div>
      <div><b>Sunrise:</b><br>${d.sunrise}</div>
      <div><b>Light Pollution:</b><br>${(light*100).toFixed(0)}%</div>
    </div>
  `;

  document.getElementById('moon-global').innerHTML = `
    <p><b>Moon Phase:</b> ${moonPhaseName(d.moonphase)}</p>
    <img src="${getMoonImage(d.moonphase)}">
  `;

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type:'line',
    data:{
      labels: night.map(h=>h.datetime),
      datasets:[{
        data: night.map(h=>telescopeScore(h, light)),
        borderColor:'#444444',
        segment:{ borderColor: ctx => scoreColor(ctx.p1.parsed.y) },
        pointRadius: 4,
        pointStyle: 'circle',
        pointBackgroundColor: ctx => scoreColor(ctx.parsed.y),
        pointBorderColor: '#444444',
        pointBorderWidth: 1
      }]
    },
    options:{
      maintainAspectRatio:false,
      plugins:{ 
        legend:{display:false}, 
        title:{display:true, text:'Viewing Score', color:'#ffffff', font:{size:22}} 
      },
      scales:{
        y:{ 
          min:0, 
          max:100, 
          grid:{display:false}, 
          ticks:{color:'#e0e6ff', font:{size:14}} 
        },
        x:{ 
          grid:{display:false}, 
          ticks:{color:'#e0e6ff', font:{size:14}} 
        }
      }
    }
  });

  document.getElementById('forecast-content').innerHTML = `
    <h3 style="width:100%; text-align:left;">Viewing Score Forecast</h3>
    <div style="display:flex; flex-direction:row; gap:20px; width:100%; overflow-x:auto;">
      ${json.days.slice(0,7).map(day=>`
        <div style="display:flex; flex-direction:column; align-items:center; min-width:90px; font-size:1.1rem; padding:4px 0;">
          <span style="font-weight:bold; margin-bottom:4px;">${day.datetime}</span>
          <span style="color:${scoreColor(telescopeScore(day, light))}">${telescopeScore(day, light).toFixed(0)}%</span>
        </div>
      `).join('')}
    </div>
  `;
}

window.addEventListener('DOMContentLoaded', () => {
});

</script>

</body>
</html>
