<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astronomy Weather Viewer</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

html { font-size: 22px; }

body {
  font-family: Arial;
  background: url('images/stars/star_cluster.png') no-repeat center center fixed;
  background-size: cover;
  color:#e0e6ff;
  text-align:center;
  overflow-y: auto;
}

.main {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  height:auto;
  padding-top:100px;
}

.search-container {
  margin-bottom:20px;
  margin-top:30px;
}

.content {
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:20px;
  width:100%;
  max-width:1300px; /* widened for 3-column layout */
}

.left { width:25%; }
.middle { width:30%; }
.right { width:45%; }

.card {
  padding:10px;
  font-size:1.4rem;
}

/* BIGGER GRAPH */
canvas {
  width:100%;
  height:420px;
}

.header {
  position:absolute;
  top:20px;
  left:20px;
  text-align:left;
}

.header h1 { font-size:2rem; margin:0; }
.header p { font-size:1.4rem; margin:0; color:#aaa; }

</style>
</head>

<body>

<div class="header">
  <h1>Astronomy Weather</h1>
  <p>Worldwide</p>
</div>

<div class="main">

  <div class="search-container">
    <input id="zip" placeholder="Search city or ZIP" style="font-size:1.4rem; padding:12px; width:400px;">
    <div id="suggestions"></div>
  </div>

  <div class="content">
    <!-- LEFT: FORECAST -->
    <div class="left card" id="forecast-content"></div>

    <!-- MIDDLE: CONDITIONS -->
    <div class="middle card" id="conditions"></div>

    <!-- RIGHT: GRAPH -->
    <div class="right card">
      <canvas id="chart"></canvas>
    </div>
  </div>

</div>

<script>

const input = document.getElementById('zip');
const suggestionsEl = document.getElementById('suggestions');

input.addEventListener('keypress', e=>{
  if(e.key==='Enter') getWeather();
});

function telescopeScore(d, light){
  return (
    (1 - (d.cloudcover||0)/100)*0.3 +
    (1 - (d.humidity||0)/100)*0.15 +
    (1 - (d.precipprob||0)/100)*0.1 +
    (1 - (d.windspeed||0)/25)*0.15 +
    ((d.visibility||0)/15)*0.15 +
    (2*Math.abs((d.moonphase||0)-0.5))*0.1 +
    (1-light)*0.05
  ) * 100;
}

function estimateLightPollution(address){
  const a = address.toLowerCase();
  if(a.includes('new york') || a.includes('los angeles')) return 0.8;
  return 0.3;
}

let chart;

async function getWeather(){
  const zip = input.value;
  if(!zip) return;

  const res = await fetch(`https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${zip}?unitGroup=us&key=ZSMBVQBG98BSW845P5KQ9VVDE&contentType=json&include=hours`);
  const json = await res.json();

  const d = json.days[0];
  const light = estimateLightPollution(json.resolvedAddress);

  document.getElementById('conditions').innerHTML = `
    <h2>${json.resolvedAddress}</h2>
    <p><b>Temp:</b> ${d.temp}°F</p>
    <p><b>Conditions:</b> ${d.conditions}</p>
    <h3>Viewing Score: ${telescopeScore(d, light).toFixed(1)}%</h3>
  `;

  // FORECAST LEFT SIDE
  document.getElementById('forecast-content').innerHTML = `
    <h3>Viewing Score Forecast</h3>
    <div style="display:flex; flex-direction:column; gap:10px;">
      ${json.days.slice(0,7).map(day=>`
        <div>
          <b>${day.datetime}</b>: ${telescopeScore(day, light).toFixed(0)}%
        </div>
      `).join('')}
    </div>
  `;

  // GRAPH
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById('chart'), {
    type:'line',
    data:{
      labels: json.days.slice(0,7).map(d=>d.datetime),
      datasets:[{
        data: json.days.slice(0,7).map(d=>telescopeScore(d, light)),
        borderColor:'#888',
        pointRadius:5
      }]
    },
    options:{
      maintainAspectRatio:false,
      plugins:{
        title:{
          display:true,
          text:'Viewing Score Trend',
          font:{size:22}
        }
      },
      scales:{
        y:{
          min:0,
          max:100,
          ticks:{
            color:'#fff',
            font:{size:16} /* bigger y-axis text */
          }
        },
        x:{
          ticks:{
            color:'#fff',
            font:{size:16} /* bigger x-axis text */
          }
        }
      }
    }
  });
}

</script>

</body>
</html>
